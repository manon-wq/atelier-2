<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver ma séance | STUDENT MOVE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Variables & Reset --- */
        :root {
            --bg-black: #050505;
            --neon-green: #ADFF2F;
            --accent-purple: #784BA0;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-main: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-black);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
            /* Subtiles lueurs dynamiques en arrière-plan */
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(120, 75, 160, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(173, 255, 47, 0.05) 0%, transparent 35%);
        }

        /* --- UI Components --- */
        .booking-container {
            max-width: 650px;
            width: 100%;
            margin: 2rem auto;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInPage 0.8s forwards;
        }

        @keyframes fadeInPage {
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* --- Form Elements --- */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
        }

        .form-label i {
            margin-right: 8px;
            color: var(--neon-green);
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 18px;
            color: #fff;
            transition: var(--transition);
        }

        /* Hack pour éviter le fond blanc natif des navigateurs */
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--neon-green);
            box-shadow: 0 0 0 4px rgba(173, 255, 47, 0.1);
            color: #fff;
        }

        .form-select option {
            background-color: var(--bg-black);
            color: white;
        }

        /* --- Checkbox Styling --- */
        .form-check-input {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-border);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--neon-green);
            border-color: var(--neon-green);
        }

        /* --- CTA Button --- */
        .btn-submit {
            background: var(--gradient-main);
            border: none;
            border-radius: 16px;
            padding: 18px 30px;
            color: #fff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 1.5rem;
            position: relative;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(120, 75, 160, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 60, 172, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* --- GDPR & Footer --- */
        .privacy-note {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.5;
            margin-top: 1rem;
        }

        .shield-icon {
            color: var(--neon-green);
            margin-right: 5px;
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .glass-card { padding: 1.5rem; }
            h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="booking-container">
            <div class="text-center mb-4">
                <a href="#" class="text-decoration-none" style="color: var(--neon-green); font-weight: 800;">
                    <i class="fas fa-arrow-left me-2"></i> RETOUR
                </a>
            </div>

            <div class="glass-card">
                <div class="text-center mb-5">
                    <h1 class="mb-2">RÉSERVE TA <span style="color: var(--neon-green);">SÉANCE</span></h1>
                    <p class="opacity-50">Remplis tes infos et rejoins le mouvement.</p>
                </div>

                <form id="bookingForm">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label"><i class="fas fa-user"></i> Prénom</label>
                            <input type="text" class="form-control" placeholder="Ex: Lucas" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label"><i class="fas fa-id-card"></i> Nom</label>
                            <input type="text" class="form-control" placeholder="Ex: Martin" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label"><i class="fas fa-envelope"></i> Email Étudiant</label>
                            <input type="email" class="form-control" placeholder="lucas.martin@etu.univ.fr" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label"><i class="fas fa-dumbbell"></i> Choisis ton sport</label>
                            <select class="form-select" required>
                                <option value="" disabled selected>Sélectionne une discipline...</option>
                                <option value="skating">⛸️ Patinage Artistique — 8€</option>
                                <option value="dance">💃 Danse Urbaine — 6€</option>
                                <option value="running">🏃 Coaching Course — 5€</option>
                                <option value="pilates">🧘 Pilates — 7€</option>
                            </select>
                        </div>

                        <div class="col-12 mt-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rgpdCheck" required>
                                <label class="form-check-label small opacity-75" for="rgpdCheck">
                                    J'accepte que mes données soient utilisées uniquement pour la gestion de ma réservation.
                                </label>
                            </div>
                            <div class="privacy-note d-flex align-items-start">
                                <i class="fas fa-shield-alt shield-icon mt-1"></i>
                                <span>Tes données sont cryptées et ne seront jamais partagées avec des tiers. Sécurité garantie.</span>
                            </div>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-submit">
                                  <i class="fas fa-credit-card me-2"></i> Procéder au paiement
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="text-center mt-4 opacity-25 small">
                © 2026 STUDENT MOVE. TOUS DROITS RÉSERVÉS.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Animation du bouton au clic
            const btn = this.querySelector('.btn-submit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> REDIRECTION...';
            btn.style.opacity = '0.8';
            
            // Simulation de redirection vers Stripe
            setTimeout(() => {
                alert('Redirection sécurisée vers la page de paiement Stripe...');
                // window.location.href = "URL_STRIPE_ICI";
            }, 800);
        });

        // Micro-interaction : effet parallaxe léger sur la carte au mouvement de la souris (Desktop uniquement)
        if (window.innerWidth > 992) {
            const card = document.querySelector('.glass-card');
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
        }
    </script>
</body>
</html>

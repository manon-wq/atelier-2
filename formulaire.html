<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver ma séance | STUDENT MOVE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Système de Design --- */
        :root {
            --bg-deep: #050505;
            --neon-green: #ADFF2F;
            --accent-purple: #784BA0;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-primary: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
            --font-main: 'Outfit', sans-serif;
            --font-title: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            /* Subtiles lueurs de fond pour la profondeur */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(120, 75, 160, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(173, 255, 47, 0.05) 0%, transparent 40%);
        }

        /* --- Animation d'entrée --- */
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Carte Glassmorphism --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }

        /* --- Typographie --- */
        h1 {
            font-family: var(--font-title);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .text-accent { color: var(--neon-green); }

        /* --- Formulaire --- */
        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.6rem;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--neon-green);
            box-shadow: 0 0 0 4px rgba(173, 255, 47, 0.1);
            color: #fff;
        }

        /* Correction pour les options sombres sur certains navigateurs */
        .form-select option {
            background-color: var(--bg-deep);
            color: white;
        }

        /* --- Checkbox Custom --- */
        .form-check-input {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-border);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--neon-green);
            border-color: var(--neon-green);
        }

        /* --- Bouton de Paiement --- */
        .btn-pay {
            background: var(--gradient-primary);
            border: none;
            border-radius: 14px;
            padding: 18px;
            color: #fff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(120, 75, 160, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
        }

        .btn-pay:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 60, 172, 0.4);
            filter: brightness(1.1);
        }

        .btn-pay:active {
            transform: scale(0.98);
        }

        .btn-pay:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        /* --- Spinner Loading --- */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Footer Info --- */
        .security-note {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 1.5rem;
            text-align: center;
        }

        /* --- Responsive --- */
        @media (max-width: 576px) {
            .glass-card {
                padding: 2rem 1.5rem;
                border-radius: 0;
                border: none;
                background: transparent;
                backdrop-filter: none;
            }
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="glass-card fade-in-up">
            
            <header class="text-center mb-5">
                <p class="text-accent fw-bold small mb-2">ÉTAPE 1 SUR 2</p>
                <h1>RÉSERVE TA <span class="text-accent">SÉANCE</span></h1>
                <p class="opacity-50">Complète tes informations pour accéder au paiement.</p>
            </header>

            <form id="booking-form">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="first-name" class="form-label">Prénom</label>
                        <input type="text" id="first-name" class="form-control" placeholder="Lucas" required>
                    </div>
                    <div class="col-md-6">
                        <label for="last-name" class="form-label">Nom</label>
                        <input type="text" id="last-name" class="form-control" placeholder="Martin" required>
                    </div>

                    <div class="col-12">
                        <label for="student-email" class="form-label">Email Étudiant</label>
                        <input type="email" id="student-email" class="form-control" placeholder="nom.prenom@univ-exemple.fr" required>
                    </div>

                    <div class="col-12">
                        <label for="sport-select" class="form-label">Choisir un sport</label>
                        <select id="sport-select" class="form-select" required>
                            <option value="" disabled selected>Quelle est ta vibe aujourd'hui ?</option>
                            <option value="skating">⛸️ Patinage Artistique — 8€</option>
                            <option value="dance">💃 Danse Urbaine — 6€</option>
                            <option value="running">🏃 Coaching Course — 5€</option>
                            <option value="pilates">🧘 Pilates — 7€</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <div class="form-check d-flex align-items-center gap-2">
                            <input class="form-check-input" type="checkbox" id="gdpr" required>
                            <label class="form-check-label small opacity-75" for="gdpr">
                                J'accepte que mes données soient utilisées pour gérer ma réservation.
                            </label>
                        </div>
                    </div>

                    <div class="col-12 mt-5">
                        <button type="submit" id="submit-btn" class="btn-pay">
                            <span class="spinner" id="btn-spinner"></span>
                            <span id="btn-text">Procéder au paiement</span>
                        </button>
                    </div>
                </div>
            </form>

            <footer class="security-note">
                <i class="fas fa-shield-alt me-1"></i> Paiement 100% sécurisé via Stripe. <br>
                Vos données personnelles sont cryptées.
            </footer>
        </div>
    </div>

    <script>
        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('btn-text');

            // 1. Activation de l'état "Loading"
            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'Redirection...';

            // 2. Délai simulé (800ms) puis redirection
            setTimeout(() => {
                window.location.href = "checkout.html";
            }, 800);
        });
    </script>

</body>
</html>

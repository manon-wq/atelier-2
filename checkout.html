<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Sécurisé | STUDENT MOVE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Système de Design Dark Mode --- */
        :root {
            --bg-deep: #050505;
            --neon-green: #ADFF2F;
            --accent-purple: #784BA0;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-stripe: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
            --font-main: 'Outfit', sans-serif;
            --font-title: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(120, 75, 160, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(173, 255, 47, 0.05) 0%, transparent 40%);
        }

        /* --- Animations & Cards --- */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            height: 100%;
        }

        h1 { font-family: var(--font-title); font-weight: 800; letter-spacing: -1px; }
        
        .summary-badge {
            background: rgba(173, 255, 47, 0.1);
            color: var(--neon-green);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 12px 0;
        }

        /* --- Simulation Inputs --- */
        .form-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-group-custom {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            width: 100%;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .input-group-custom:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(255, 255, 255, 0.06);
        }

        /* --- Logos de Paiement (Blanc) --- */
        .payment-logos {
            display: flex;
            gap: 15px;
            justify-content: center;
            filter: brightness(0) invert(1);
            opacity: 0.6;
            margin-top: 2rem;
        }

        /* --- Bouton de Paiement --- */
        .btn-pay {
            background: var(--gradient-stripe);
            border: none;
            border-radius: 16px;
            padding: 18px 30px;
            width: 100%;
            color: #FFFFFF !important;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none !important;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(120, 75, 160, 0.3);
            cursor: pointer;
        }

        .btn-pay:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 60, 172, 0.5);
            filter: brightness(1.1);
        }

        /* --- Spinner --- */
        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #FFFFFF;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            
            <header class="text-center mb-5 fade-in">
                <h1 class="display-5">Paiement <span style="color:var(--neon-green)">Sécurisé</span></h1>
                <p class="opacity-50">Simulation de paiement final pour ta séance.</p>
            </header>

            <div class="row g-4">
                <div class="col-lg-4 fade-in" style="animation-delay: 0.1s;">
                    <div class="glass-card">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="m-0 fw-bold">Résumé</h5>
                            <span class="summary-badge">STUDENT MOVE</span>
                        </div>
                        <div class="summary-line">
                            <span class="opacity-50">Séance</span>
                            <span class="fw-bold">Patinage Artistique</span>
                        </div>
                        <div class="summary-line">
                            <span class="opacity-50">Coach</span>
                            <span class="fw-bold">Sarah</span>
                        </div>
                        <div class="mt-4 p-3 rounded-4" style="background: rgba(255,255,255,0.03);">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold">Total</span>
                                <span class="h3 mb-0 fw-black" style="color:var(--neon-green)">8.00€</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8 fade-in" style="animation-delay: 0.2s;">
                    <div class="glass-card">
                        <form id="payment-simulation-form">
                            <div class="mb-4">
                                <label class="form-label">Nom sur la carte</label>
                                <input type="text" class="input-group-custom" placeholder="Jean Dupont">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Détails de paiement</label>
                                <input type="text" class="input-group-custom" placeholder="4242 4242 4242 4242">
                                <div class="row g-2">
                                    <div class="col-6">
                                        <input type="text" class="input-group-custom" placeholder="MM / YY">
                                    </div>
                                    <div class="col-6">
                                        <input type="text" class="input-group-custom" placeholder="CVC">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn-pay" id="pay-button">
                                <div class="spinner" id="btn-spinner"></div>
                                <span id="btn-text">Payer et confirmer ma séance</span>
                            </button>
                        </form>

                        <div class="payment-logos">
                            <i class="fab fa-cc-stripe fa-2x"></i>
                            <i class="fab fa-apple-pay fa-2x"></i>
                            <i class="fab fa-google-pay fa-2x"></i>
                            <i class="fab fa-cc-visa fa-2x"></i>
                            <i class="fab fa-cc-mastercard fa-2x"></i>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="text-center mt-5 opacity-25 small">
                © 2026 STUDENT MOVE — Paiement sécurisé crypté.
            </footer>
        </div>
    </div>
</div>

<script>
    const paymentForm = document.getElementById('payment-simulation-form');
    const payBtn = document.getElementById('pay-button');
    const spinner = document.getElementById('btn-spinner');
    const label = document.getElementById('btn-text');

    paymentForm.addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. État de chargement UI
        payBtn.style.pointerEvents = "none"; 
        spinner.style.display = "block";
        label.innerText = "Traitement…";

        // 2. Délai de 1.5s puis redirection vers confirmation.html
        setTimeout(() => {
            window.location.href = "confirmation.html";
        }, 1500);
    });
</script>

</body>
</html>

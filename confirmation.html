<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation de Paiement | STUDENT MOVE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-deep: #050505;
            --neon-green: #ADFF2F;
            --accent-purple: #784BA0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-success: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Empêche le scroll pendant l'animation */
            /* Lueurs de fond style dashboard premium */
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(120, 75, 160, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(173, 255, 47, 0.08) 0%, transparent 40%);
        }

        /* --- Success Card --- */
        .confirmation-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 4rem 2rem;
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transform: scale(0.9);
            animation: cardEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: scale(1); }
        }

        /* --- Success Icon Animation --- */
        .success-icon-container {
            width: 100px;
            height: 100px;
            background: rgba(173, 255, 47, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
        }

        .success-icon-container i {
            font-size: 3rem;
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(173, 255, 47, 0.5);
            animation: checkPop 0.5s 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes checkPop {
            to { opacity: 1; transform: scale(1); }
        }

        /* --- Typography --- */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        .status-msg {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* --- Buttons --- */
        .btn-group-vertical { width: 100%; }

        .btn-custom {
            border-radius: 16px;
            padding: 16px 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary-custom {
            background: var(--gradient-success);
            color: white;
            box-shadow: 0 10px 25px rgba(120, 75, 160, 0.3);
        }

        .btn-primary-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 60, 172, 0.4);
            filter: brightness(1.1);
        }

        .btn-secondary-custom {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
        }

        .btn-secondary-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .btn-notify {
            background: transparent;
            border: 1px dashed var(--neon-green);
            color: var(--neon-green);
            font-size: 0.85rem;
        }

        .btn-notify:hover {
            background: rgba(173, 255, 47, 0.1);
            color: var(--neon-green);
        }

        /* --- Email Info Box --- */
        .email-info {
            background: rgba(173, 255, 47, 0.05);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--neon-green);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2.5rem;
        }

        @media (max-width: 576px) {
            h1 { font-size: 1.8rem; }
            .confirmation-card { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="confirmation-card">
        <div class="success-icon-container">
            <i class="fas fa-check-circle"></i>
        </div>

        <h1>Paiement confirmé 🎉</h1>
        <p class="status-msg">
            C'est validé ! Ta séance a été réservée avec succès. <br>
            Prépare-toi à bouger !
        </p>

        <div class="email-info">
            <i class="fas fa-envelope-open-text"></i>
            <span>Tes détails arrivent par email d'ici 2 min.</span>
        </div>

        <div class="d-flex flex-column">
            <a href="index.html" class="btn-custom btn-primary-custom text-decoration-none">
                <i class="fas fa-home"></i> Retour à l'accueil
            </a>
            
            <a href="#" class="btn-custom btn-secondary-custom text-decoration-none">
                <i class="fas fa-calendar-alt"></i> Modifier ma réservation
            </a>

            <button class="btn-custom btn-notify" id="notifyBtn">
                <i class="fas fa-bell"></i> M'avertir des prochaines offres
            </button>
        </div>
    </div>

    <script>
        // --- 1. Animation Confetti ---
        function launchCelebration() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                // Confetti gauche
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#FF3CAC', '#784BA0', '#ADFF2F']
                });
                // Confetti droit
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#2B86C5', '#784BA0', '#ADFF2F']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // Explosion centrale initiale
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FF3CAC', '#784BA0', '#ADFF2F', '#2B86C5']
            });
        }

        // Lancement auto au chargement
        window.onload = launchCelebration;

        // --- 2. Interaction Bouton Notification ---
        document.getElementById('notifyBtn').addEventListener('click', function() {
            this.innerHTML = '<i class="fas fa-check"></i> C\'est noté !';
            this.style.borderColor = 'transparent';
            this.style.background = 'rgba(173, 255, 47, 0.2)';
            
            // Petit effet de confetti local pour le bouton
            confetti({
                particleCount: 40,
                spread: 50,
                origin: { y: 0.8 }
            });
        });
    </script>
</body>
</html>
